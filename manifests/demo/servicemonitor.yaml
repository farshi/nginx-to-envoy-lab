apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: demo-api
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames: ["demo"]
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
