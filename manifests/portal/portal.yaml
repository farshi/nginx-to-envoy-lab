# The portal.html ConfigMap is created at apply time by `make portal`
# (kubectl create configmap portal-html --from-file=portal.html).
# This file owns the Deployment, Service and Ingress that serve it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: demo
  labels:
    app.kubernetes.io/name: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: portal,  mountPath: /usr/share/nginx/html/portal.html, subPath: portal.html }
            - { name: nginxcf, mountPath: /etc/nginx/conf.d/default.conf,    subPath: default.conf }
            - { name: cache,   mountPath: /var/cache/nginx }
            - { name: run,     mountPath: /var/run }
            - { name: tmp,     mountPath: /tmp }
          resources:
            requests: { cpu: 20m, memory: 24Mi }
            limits:   { cpu: 100m, memory: 64Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: portal
          configMap:
            name: portal-html
        - name: nginxcf
          configMap:
            name: portal-nginx-conf
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-nginx-conf
  namespace: demo
data:
  default.conf: |
    server {
      listen       8080;
      server_name  _;
      root         /usr/share/nginx/html;
      index        portal.html;
      location / {
        try_files $uri $uri/ /portal.html;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: demo
  labels:
    app.kubernetes.io/name: portal
spec:
  selector:
    app.kubernetes.io/name: portal
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal
  namespace: demo
spec:
  ingressClassName: nginx
  rules:
    - host: portal.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal
                port:
                  name: http
