# Envoy Gateway provisions a Service for the proxy with only the HTTP port (80).
# The proxy emits Prometheus metrics on container port 19001 (named "metrics"),
# which the Service does not expose — so we scrape the pods directly with a PodMonitor.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-proxy
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames: ["envoy-gateway-system"]
  selector:
    matchLabels:
      app.kubernetes.io/component: proxy
      app.kubernetes.io/managed-by: envoy-gateway
      app.kubernetes.io/name: envoy
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      interval: 15s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_gateway_envoyproxy_io_owning_gateway_name]
          targetLabel: gateway
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: envoy_pod
