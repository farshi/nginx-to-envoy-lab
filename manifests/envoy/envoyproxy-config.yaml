# EnvoyProxy config — switch the auto-provisioned envoy proxy Service from
# LoadBalancer (default) to ClusterIP. We don't need a LoadBalancer locally
# because:
#   - k3d's klipper-lb can only fulfil one LoadBalancer per host backend port
#     and ingress-nginx already claimed it, so the LB Service stays pending
#     and leaves dangling svclb-* pods in kube-system
#   - we reach the envoy proxy via `make tunnel` (kubectl port-forward
#     svc/envoy-edge 8082:80)
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: lab-config
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: ClusterIP
  # Bind the full admin interface to 0.0.0.0:19000 so /config_dump, /clusters,
  # /listeners are reachable via kubectl port-forward. Default is 127.0.0.1
  # which is invisible to port-forward and the container is distroless so
  # exec-into-pod doesn't help. LOCAL LAB ONLY — never enable this in prod.
  bootstrap:
    type: Merge
    value: |
      admin:
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 19000
