# kube-prometheus-stack values for the nginx-to-envoy lab.
# - Grafana on NodePort 30300 (mapped to host :3000 by Makefile k3d port flag)
# - Prometheus on NodePort 30090 (mapped to host :9090)
# - Dashboard sidecar enabled so ConfigMaps labelled grafana_dashboard="1" auto-load.

grafana:
  enabled: true
  adminPassword: admin
  service:
    type: NodePort
    nodePort: 30300
  # Local lab: skip the login screen entirely. Anonymous = Admin. NEVER off-laptop.
  grafana.ini:
    security:
      allow_embedding: true
      # let iframes load Grafana cross-origin (the portal embeds it)
      cookie_samesite: none
      cookie_secure: false
    auth:
      disable_login_form: true
      disable_signout_menu: true
    auth.anonymous:
      enabled: true
      org_name: "Main Org."
      org_role: Admin
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

alertmanager:
  enabled: false

prometheusOperator:
  enabled: true

prometheus:
  enabled: true
  service:
    type: NodePort
    nodePort: 30090
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
