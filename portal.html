<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>nginx → envoy · Mission Control</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    color-scheme: light;
    --bg:      #f5f7fb;
    --panel:   #ffffff;
    --panel-alt:#fbfcfe;
    --text:    #17202a;
    --muted:   #5c6670;
    --line:    #d7dde5;
    --accent:  #1f6feb;
    --ok:      #15803d;
    --warn:    #b45309;
    --err:     #b91c1c;
    --teal:    #0d9488;
    --purple:  #7c3aed;
    --amber:   #d97706;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  code,pre{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
  iframe{border:0;width:100%;height:100%;background:var(--panel);}
  a{color:var(--accent);}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:#cdd4dd;border-radius:5px;}
  ::-webkit-scrollbar-thumb:hover{background:#b6bec9;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;

const GRAFANA = "http://localhost:3001";
const PROM    = "http://localhost:9091";
const ARGOCD  = "http://localhost:8083";

const promqlLibrary = [
  { group: "RED · Rate", items: [
    { label: "nginx — req/s",    q: "sum(rate(nginx_ingress_controller_requests[1m]))",
      desc: "Total requests per second hitting the ingress-nginx controller, summed across all instances. Should track the load generator." },
    { label: "envoy — req/s",    q: "sum(rate(envoy_cluster_upstream_rq_total[1m]))",
      desc: "Total requests per second the Envoy proxies forwarded to upstream clusters. Compare side-by-side with the nginx rate during migration." },
    { label: "demo-api — req/s", q: "sum(rate(http_requests_total{service=\"demo-api\"}[1m]))",
      desc: "Requests per second the Flask demo-api itself handled. Should equal nginx+envoy combined (minus health probes)." },
  ]},
  { group: "RED · Errors", items: [
    { label: "nginx 5xx %", q: "sum(rate(nginx_ingress_controller_requests{status=~\"5..\"}[1m])) / sum(rate(nginx_ingress_controller_requests[1m]))",
      desc: "Server-error rate (5xx) through nginx as a fraction of all nginx requests. Baseline for the migration SLO gate." },
    { label: "envoy 5xx %", q: "sum(rate(envoy_cluster_upstream_rq_xx{envoy_response_code_class=\"5\"}[1m])) / sum(rate(envoy_cluster_upstream_rq_total[1m]))",
      desc: "Same signal on the Envoy side. Cutover SLO: Envoy 5xx% ≤ nginx baseline + 0.1%. Above = auto rollback." },
    { label: "envoy 5xx absolute", q: "sum(rate(envoy_cluster_upstream_rq_xx{envoy_response_code_class=\"5\"}[1m]))",
      desc: "Raw 5xx-per-second through Envoy. Useful when a low percentage hides a real volume spike." },
  ]},
  { group: "RED · Latency", items: [
    { label: "nginx p99", q: "histogram_quantile(0.99, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[5m])) by (le))",
      desc: "99th-percentile request latency through nginx, computed from the histogram bucket counters over a 5m window." },
    { label: "envoy p99", q: "histogram_quantile(0.99, sum(rate(envoy_cluster_upstream_rq_time_bucket[5m])) by (le))",
      desc: "Envoy's 99th-percentile upstream request time. Cutover SLO: Envoy p99 ≤ nginx p99 × 1.10." },
    { label: "demo-api p99", q: "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
      desc: "App-level p99 (inside the Flask handler). Differs from ingress p99 by the proxy overhead — useful to attribute slowness." },
  ]},
  { group: "Envoy — health & xDS", items: [
    { label: "xDS connected (1=up)", q: "max(envoy_control_plane_connected_state)",
      desc: "1 = at least one Envoy proxy currently has a healthy gRPC stream to the control plane. 0 = config delivery broken, last-known-good still serving." },
    { label: "healthy upstream endpoints", q: "sum(envoy_cluster_membership_healthy)",
      desc: "Total upstream pod endpoints Envoy currently considers healthy across all clusters. Should match the live pod count for the demo-api Service." },
    { label: "outlier ejections (active)", q: "sum(envoy_cluster_outlier_detection_ejections_active)",
      desc: "Endpoints Envoy has auto-ejected for consecutive 5xx or high latency. Non-zero in steady state = a real backend problem to investigate before ramping." },
    { label: "circuit breaker overflow", q: "sum(rate(envoy_cluster_upstream_cx_overflow[5m]))",
      desc: "Rate of requests Envoy fast-failed because cluster connection / pending limits were hit (UO response flag). Non-zero = CB thresholds too tight for the load." },
    { label: "active upstream conns", q: "sum(envoy_cluster_upstream_cx_active)",
      desc: "Current open connections from Envoy to upstream pods. Helps spot connection pool exhaustion or leak." },
  ]},
  { group: "Resource cost", items: [
    { label: "envoy memory (MiB)", q: "container_memory_working_set_bytes{pod=~\".*envoy.*\"} / 1024 / 1024",
      desc: "Working-set memory of each Envoy proxy container in MiB. Envoy uses more RAM than nginx — watch for regression during ramp." },
    { label: "nginx memory (MiB)", q: "container_memory_working_set_bytes{pod=~\".*ingress-nginx.*\"} / 1024 / 1024",
      desc: "Working-set memory of the ingress-nginx controller container in MiB. The baseline you compare Envoy against." },
    { label: "envoy CPU throttle", q: "rate(container_cpu_cfs_throttled_seconds_total{pod=~\".*envoy.*\"}[5m])",
      desc: "Seconds-per-second the kernel throttled the Envoy container because it hit its CPU limit. Non-zero = limit is too tight, raise it." },
  ]},
];

const migrationSteps = [
  { phase: "0 · Prep", days: "T-7", items: [
    "Document current nginx config: annotations, custom snippets, TLS, rate-limits.",
    "Lower DNS TTL to 60s for every hostname that will move (kills slow rollback).",
    "Capture 7 days of nginx baseline: request rate, 5xx %, p99 — these become SLO gates.",
    "Pre-stage Envoy Gateway in non-prod with the same routes; pass functional tests.",
    "Build the nginx-annotation → Gateway-API translation matrix.",
    "Announce change window to app teams + incident channel.",
  ]},
  { phase: "1 · Deploy parallel", days: "T-1", items: [
    "Install Envoy Gateway alongside ingress-nginx — different namespace, different LB.",
    "Apply GatewayClass + Gateway + HTTPRoute mirroring active nginx routes.",
    "Curl / port-forward the Envoy path directly (no public traffic yet).",
    "Confirm Prometheus scrapes Envoy /stats/prometheus and dashboard populated.",
    "Exit gate: Envoy returns same status / body for the test suite as nginx.",
  ]},
  { phase: "2 · Shadow / mirror (24h)", days: "T-0", items: [
    "Mirror 100% prod traffic to Envoy (LB mirror or in-cluster sidecar).",
    "Compare distributions: status code, latency p50/p95/p99, body checksums.",
    "Watch new dashboards: upstream health, outlier ejections, xDS sync, memory.",
    "Exit gate: every SLO in MIGRATION_SUCCESS.md green for 24h, no divergent pattern.",
  ]},
  { phase: "3 · Weighted ramp", days: "T-0", items: [
    "5%  → hold 30min → gates green → next",
    "25% → hold 30min → gates green → next",
    "50% → hold 60min → gates green → next",
    "100% → soak 24h",
    "Auto-rollback to previous weight on ANY SLO gate breach.",
  ]},
  { phase: "4 · Cutover complete", days: "T+1", items: [
    "Mark migration complete after 24h clean soak at 100%.",
    "Keep nginx warm (no DNS pointing at it) for fast revert option.",
  ]},
  { phase: "5 · Decommission", days: "T+14", items: [
    "After 14 clean days: delete Ingress objects, helm uninstall ingress-nginx.",
    "Archive nginx-specific dashboards, alerts, runbooks.",
    "Final comms: migration complete.",
  ]},
];

const rollbackLevels = [
  { lvl: "L1", title: "Reduce weight (seconds)",          body: "DNS weight back to previous step. e.g. 25% → 5%. Envoy still partially viable but breach detected." },
  { lvl: "L2", title: "Full revert (≤60s with 60s TTL)",  body: "DNS Envoy 0%, nginx 100%. Envoy materially worse than baseline." },
  { lvl: "L3", title: "Pin via HTTPRoute",                body: "Internal / DNS-slow clients: HTTPRoute weights to 0 for the new backend variant." },
  { lvl: "L4", title: "Kill Envoy listener",              body: "kubectl delete gateway eg OR scale Envoy proxy to 0. Use only if Envoy is actively harmful." },
];

const localTools = [
  { name: "Grafana",     url: "http://localhost:3001",                note: "anonymous admin · dashboard: Ingress Migration — nginx vs Envoy" },
  { name: "Prometheus",  url: "http://localhost:9091",                note: "/targets to confirm scrape health" },
  { name: "ArgoCD",      url: "http://localhost:8083",                note: "anonymous admin · GitOps for manifests/ tree (run: make argocd-ui)" },
  { name: "Portal",      url: "http://portal.localhost:8081/",        note: "this page, served from in-cluster nginx (needs /etc/hosts)" },
  { name: "nginx path",  url: "http://nginx-demo.localhost:8081/",    note: "needs /etc/hosts line" },
  { name: "envoy path",  url: "http://envoy-demo.localhost:8082/",    note: "via make tunnel — k3d serverlb only forwards one LB" },
  { name: "GitHub repo", url: "https://github.com/farshi/nginx-to-envoy-lab", note: "public source" },
];

const commandCheatsheet = [
  // ── The 5 demo commands (raw kubectl OR make wrapper)
  { label: "Phase-0 audit (annotations + hosts)", cmd: "make audit\n# or raw:\nkubectl get ing -A -o yaml | grep -E \"nginx.ingress|ingressClassName|host:\"" },
  { label: "Deploy Envoy parallel",  cmd: "make envoy-up\n# or raw:\nkubectl apply -f manifests/envoy/\nkubectl wait -n envoy-gateway-system pod -l gateway.envoyproxy.io/owning-gateway-name=eg --for=condition=Ready --timeout=180s" },
  { label: "Show Envoy pods",        cmd: "make envoy-pods\n# or raw:\nkubectl get pods -n envoy-gateway-system" },
  { label: "Smoke-test both paths",  cmd: "make smoke\n# or raw:\ncurl -H \"Host: nginx-demo.localhost\" http://localhost:8081/\ncurl -H \"Host: envoy-demo.localhost\" http://localhost:8082/" },
  { label: "Rollback (delete Envoy)", cmd: "make envoy-down\n# or raw:\nkubectl delete httproute demo-via-envoy -n demo\nkubectl delete gateway eg -n demo" },
  // ── Failure injection
  { label: "Inject 10% random 5xx",  cmd: "make chaos\n# or raw:\nkubectl -n demo set env deploy/demo-api ERROR_RATE_PERCENT=10" },
  { label: "Reset chaos",            cmd: "make chaos-stop" },
  { label: "Hammer /fail (5xx)",     cmd: "make bad-traffic" },
  { label: "Hammer /slow?seconds=2", cmd: "make slow-traffic" },
  // ── Bootstrap / lifecycle
  { label: "Bootstrap whole lab",    cmd: "make up" },
  { label: "Status of all traffic",  cmd: "make traffic-status" },
  { label: "Tear down cluster",      cmd: "make down" },
  // ── Envoy admin (deep diagnostics)
  { label: "Open Envoy admin :19000", cmd: "make envoy-admin" },
  { label: "Envoy /clusters",        cmd: "curl -s localhost:19000/clusters | head" },
  { label: "Envoy /config_dump",     cmd: "curl -s localhost:19000/config_dump | jq '.configs[].\"@type\"'" },
  // ── Prometheus inspection
  { label: "Prom targets UP",        cmd: "curl -s http://localhost:9091/api/v1/targets?state=active | jq '.data.activeTargets[].labels.job' | sort -u" },
];

const sloGates = [
  { k: "Envoy 5xx",          t: "≤ nginx + 0.1 %" },
  { k: "Envoy p99",          t: "≤ nginx × 1.10" },
  { k: "Healthy endpoints",  t: "envoy == nginx" },
  { k: "CB overflow",        t: "rate == 0" },
  { k: "xDS sync",           t: "connected_state == 1" },
  { k: "Memory",             t: "envoy ≤ nginx × 2" },
];

const promLink = (q) => `${PROM}/graph?g0.expr=${encodeURIComponent(q)}&g0.tab=0`;

// shared styles
const card     = { background: "var(--panel)",     border: "1px solid var(--line)", borderRadius: 6 };
const cardAlt  = { background: "var(--panel-alt)", border: "1px solid var(--line)", borderRadius: 6 };
const muted    = { color: "var(--muted)", fontSize: 12 };
const sectionH = { color: "var(--text)", fontSize: 13, fontWeight: 600, letterSpacing: "0.02em", marginBottom: 10, textTransform: "uppercase" };

function CopyBtn({ text }) {
  const [done, setDone] = useState(false);
  return (
    <button
      onClick={() => { navigator.clipboard.writeText(text); setDone(true); setTimeout(() => setDone(false), 1200); }}
      style={{ background: done ? "#eef5ff" : "transparent", border: `1px solid ${done ? "var(--accent)" : "var(--line)"}`, color: done ? "var(--accent)" : "var(--muted)", padding: "3px 9px", fontSize: 11, fontFamily: "inherit", cursor: "pointer", borderRadius: 4 }}>
      {done ? "✓ copied" : "copy"}
    </button>
  );
}

function Sidebar({ active, setActive }) {
  const tabs = [
    { id: "grafana",  label: "Grafana",          emoji: "📈", color: "var(--accent)" },
    { id: "prom",     label: "Prometheus",       emoji: "📊", color: "var(--purple)" },
    { id: "argocd",   label: "ArgoCD",           emoji: "🚀", color: "#ef7b4d"       },
    { id: "steps",    label: "Migration Steps",  emoji: "🛣️", color: "var(--teal)"   },
    { id: "rollback", label: "Rollback",         emoji: "↩️", color: "var(--err)"    },
    { id: "tools",    label: "Tools & Commands", emoji: "🛠️", color: "var(--amber)"  },
    { id: "help",     label: "Help",             emoji: "❓", color: "var(--muted)"  },
  ];
  return (
    <aside style={{ width: 240, flexShrink: 0, background: "var(--panel)", borderRight: "1px solid var(--line)", display: "flex", flexDirection: "column", height: "100vh", position: "sticky", top: 0 }}>
      <div style={{ padding: "20px 18px 14px", borderBottom: "1px solid var(--line)" }}>
        <div style={{ fontSize: 11, color: "var(--muted)", letterSpacing: "0.12em", textTransform: "uppercase" }}>migration lab</div>
        <h1 style={{ fontSize: 16, fontWeight: 700, color: "var(--text)", margin: "4px 0 0" }}>nginx → envoy</h1>
        <div style={{ fontSize: 11, color: "var(--accent)", marginTop: 4 }}>Mission Control</div>
      </div>
      <nav style={{ padding: "12px 0", flex: 1 }}>
        {tabs.map(t => {
          const on = active === t.id;
          return (
            <button key={t.id} onClick={() => setActive(t.id)} style={{
              display: "flex", alignItems: "center", gap: 12, width: "100%",
              padding: "10px 18px",
              background: on ? "#eef5ff" : "transparent",
              border: "none",
              borderLeft: on ? `3px solid ${t.color}` : "3px solid transparent",
              color: on ? "var(--text)" : "var(--muted)",
              fontSize: 13, fontFamily: "inherit", cursor: "pointer", textAlign: "left",
              fontWeight: on ? 600 : 400,
            }}>
              <span style={{ fontSize: 15 }}>{t.emoji}</span>
              <span>{t.label}</span>
            </button>
          );
        })}
      </nav>
      <div style={{ padding: "14px 18px", borderTop: "1px solid var(--line)", fontSize: 11, color: "var(--muted)", lineHeight: 1.6 }}>
        <div style={{ color: "var(--text)", fontWeight: 600, marginBottom: 4 }}>Repo</div>
        <a href="https://github.com/farshi/nginx-to-envoy-lab" target="_blank" style={{ color: "var(--accent)", textDecoration: "none" }}>farshi/nginx-to-envoy-lab ↗</a>
      </div>
    </aside>
  );
}

function PageHeader({ title, sub, color }) {
  return (
    <div style={{ padding: "20px 28px 16px", borderBottom: "1px solid var(--line)", background: "var(--panel)" }}>
      <h2 style={{ fontSize: 20, fontWeight: 700, color: color || "var(--text)", margin: 0 }}>{title}</h2>
      {sub && <div style={{ ...muted, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function GrafanaPage() {
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
      <PageHeader title="📈 Grafana" sub="Live ingress-migration dashboard, SLO gates, quick links." color="var(--accent)" />
      <div style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 320px", gap: 14, padding: 14, minHeight: 0 }}>
        <div style={{ ...card, overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "10px 14px", fontSize: 12, color: "var(--muted)", borderBottom: "1px solid var(--line)", background: "var(--panel-alt)" }}>
            Ingress Migration — nginx vs Envoy
            <a href={GRAFANA} target="_blank" style={{ float: "right", color: "var(--accent)", textDecoration: "none", fontWeight: 500 }}>open ↗</a>
          </div>
          <div style={{ flex: 1 }}>
            <iframe src={`${GRAFANA}/d/nginx-vs-envoy/ingress-migration-nginx-vs-envoy?orgId=1&kiosk=tv&refresh=10s&theme=light`} title="grafana" />
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14, overflowY: "auto" }}>
          <div style={{ ...card, padding: 16 }}>
            <div style={sectionH}>SLO Gates (cutover-blocking)</div>
            {sloGates.map((g, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "7px 0", borderBottom: i < sloGates.length - 1 ? "1px solid var(--line)" : "none" }}>
                <span style={{ color: "var(--text)" }}>{g.k}</span>
                <span style={{ color: "var(--ok)", fontFamily: "JetBrains Mono", fontSize: 12 }}>{g.t}</span>
              </div>
            ))}
          </div>
          <div style={{ ...card, padding: 16 }}>
            <div style={sectionH}>Quick Links</div>
            {localTools.map((t, i) => (
              <a key={i} href={t.url} target="_blank" style={{ display: "block", padding: "8px 0", borderBottom: i < localTools.length - 1 ? "1px solid var(--line)" : "none", color: "var(--text)", fontSize: 13, textDecoration: "none" }}>
                <span style={{ color: "var(--accent)", fontWeight: 500 }}>▸ {t.name}</span>
                <div style={{ fontSize: 11, color: "var(--muted)", marginLeft: 14, marginTop: 2 }}>{t.note}</div>
              </a>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function PrometheusPage() {
  const [iframeSrc,   setIframeSrc]   = useState(`${PROM}/targets`);
  const [activeLabel, setActiveLabel] = useState("targets");
  const [activeDesc,  setActiveDesc]  = useState("Active scrape targets — confirms nginx, envoy and demo-api are all UP.");
  const [activeQuery, setActiveQuery] = useState("");
  const loadQuery = (q, label, desc) => { setIframeSrc(promLink(q)); setActiveLabel(label); setActiveDesc(desc); setActiveQuery(q); };
  const resetToTargets = () => {
    setIframeSrc(`${PROM}/targets`);
    setActiveLabel("targets");
    setActiveDesc("Active scrape targets — confirms nginx, envoy and demo-api are all UP.");
    setActiveQuery("");
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
      <PageHeader title="📊 Prometheus" sub="Click a query on the left to load it in the iframe. Or copy to clipboard." color="var(--purple)" />
      <div style={{ flex: 1, display: "grid", gridTemplateColumns: "420px 1fr", gap: 14, padding: 14, minHeight: 0 }}>
        <div style={{ ...card, overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "10px 14px", fontSize: 12, color: "var(--muted)", borderBottom: "1px solid var(--line)", background: "var(--panel-alt)", display: "flex", justifyContent: "space-between" }}>
            <span>Query library</span>
            <button onClick={resetToTargets} style={{ background: "transparent", border: "1px solid var(--line)", color: "var(--muted)", padding: "2px 8px", fontSize: 11, fontFamily: "inherit", cursor: "pointer", borderRadius: 4 }}>/targets</button>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: 12 }}>
            {promqlLibrary.map((g, gi) => (
              <div key={gi} style={{ marginBottom: 16 }}>
                <div style={{ color: "var(--purple)", fontSize: 11, fontWeight: 700, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{g.group}</div>
                {g.items.map((it, i) => {
                  const on = activeLabel === it.label;
                  return (
                    <div key={i} style={{ border: `1px solid ${on ? "var(--purple)" : "var(--line)"}`, borderRadius: 4, padding: "8px 10px", marginBottom: 5, background: on ? "#f5efff" : "var(--panel)", cursor: "pointer" }} onClick={() => loadQuery(it.q, it.label, it.desc)}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                        <div style={{ color: "var(--text)", fontSize: 12.5, fontWeight: on ? 600 : 500 }}>{it.label}</div>
                        <div onClick={(e) => e.stopPropagation()}><CopyBtn text={it.q} /></div>
                      </div>
                      <code style={{ display: "block", color: "var(--muted)", fontSize: 10.5, marginTop: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.q}</code>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
        <div style={{ ...card, overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "10px 14px", borderBottom: "1px solid var(--line)", background: "var(--panel-alt)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", fontSize: 12, color: "var(--muted)" }}>
              <span>Prometheus — <span style={{ color: "var(--text)", fontWeight: 600, fontSize: 13 }}>{activeLabel}</span></span>
              <a href={iframeSrc} target="_blank" style={{ color: "var(--purple)", textDecoration: "none", fontWeight: 500 }}>open ↗</a>
            </div>
            <div style={{ marginTop: 6, fontSize: 12, color: "var(--text)", lineHeight: 1.5 }}>{activeDesc}</div>
            {activeQuery && (
              <code style={{ display: "block", marginTop: 6, fontSize: 11, color: "var(--purple)", background: "var(--panel)", border: "1px solid var(--line)", padding: "4px 8px", borderRadius: 3, wordBreak: "break-all" }}>{activeQuery}</code>
            )}
          </div>
          <div style={{ flex: 1 }}>
            <iframe src={iframeSrc} title="prom" />
          </div>
        </div>
      </div>
    </div>
  );
}

function ArgoCDPage() {
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
      <PageHeader title="🚀 ArgoCD" sub="GitOps reconciliation of manifests/ — live application tree, sync + health badges." color="#ef7b4d" />
      <div style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 320px", gap: 14, padding: 14, minHeight: 0 }}>
        <div style={{ ...card, overflow: "hidden", display: "flex", flexDirection: "column" }}>
